<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <style>
    .bg{fill:#f6f7fb}
    .panel{fill:#ffffff;stroke:#e1e4ee;stroke-width:1}
    .muted{fill:#6b7280;font-family:Arial;font-size:14px}
    .title{fill:#111827;font-family:Arial;font-weight:700;font-size:20px}
    .button{fill:#0ea5a4;cursor:pointer}
    .cart{fill:#fff9eb;stroke:#f6d365}
  </style>
  <rect class="bg" width="1200" height="800"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="70" class="panel"/>
  <text x="24" y="42" class="title">POS - Punto de Venta</text>

  <!-- Left: Categories & Search -->
  <rect x="20" y="90" width="260" height="600" class="panel"/>
  <text x="40" y="120" class="muted">Buscar</text>
  <rect x="40" y="130" width="220" height="38" rx="6" fill="#ffffff" stroke="#e6e9f2"/>
  <text x="40" y="190" class="muted">Categorías</text>
  <rect x="40" y="200" width="220" height="380" rx="6" fill="#fafafa" stroke="#eef0f6"/>

  <!-- Center: Product Grid -->
  <rect x="300" y="90" width="600" height="520" class="panel"/>
  <text x="320" y="120" class="muted">Productos</text>
  <!-- sample product cards -->
  <g>
    <rect x="320" y="140" width="170" height="130" rx="8" fill="#ffffff" stroke="#eef0f6"/>
    <rect x="330" y="150" width="60" height="60" fill="#eee"/>
    <text x="400" y="175" class="muted">Producto A</text>
    <text x="400" y="195" class="title">$ 45.00</text>
    <rect x="430" y="225" width="60" height="28" class="button" rx="6"/>
    <text x="440" y="244" font-family="Arial" font-size="12" fill="#fff">Agregar</text>
  </g>
  <!-- Repeat placeholders -->
  <g transform="translate(200,0)">
    <rect x="320" y="140" width="170" height="130" rx="8" fill="#ffffff" stroke="#eef0f6"/>
    <rect x="330" y="150" width="60" height="60" fill="#eee"/>
    <text x="400" y="175" class="muted">Producto B</text>
    <text x="400" y="195" class="title">$ 30.00</text>
    <rect x="430" y="225" width="60" height="28" class="button" rx="6"/>
    <text x="440" y="244" font-family="Arial" font-size="12" fill="#fff">Agregar</text>
  </g>

  <!-- Right: Cart -->
  <rect x="920" y="90" width="260" height="600" class="panel"/>
  <text x="940" y="120" class="muted">Carrito</text>
  <rect x="940" y="140" width="220" height="360" class="cart" rx="6"/>
  <text x="940" y="520" class="muted">Total:</text>
  <text x="1120" y="520" class="title">$ 75.00</text>
  <rect x="940" y="540" width="220" height="40" class="button" rx="6"/>
  <text x="1010" y="567" font-family="Arial" font-size="14" fill="#fff">Finalizar venta</text>

  <!-- Footer / quick actions -->
  <text x="24" y="780" class="muted">Atajos: F1 = Buscar | F2 = Nueva venta</text>
</svg>
