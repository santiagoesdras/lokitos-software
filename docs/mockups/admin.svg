<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <style>
    .bg{fill:#f7f9fc}
    .panel{fill:#ffffff;stroke:#e6e9f2;stroke-width:1}
    .title{fill:#111827;font-family:Arial;font-weight:700;font-size:18px}
    .muted{fill:#6b7280;font-family:Arial;font-size:13px}
    .accent{fill:#2563eb}
  </style>
  <rect class="bg" width="1200" height="800"/>

  <!-- Left Sidebar -->
  <rect x="20" y="20" width="220" height="760" class="panel"/>
  <text x="40" y="60" class="title">Administrador</text>
  <text x="40" y="95" class="muted">Usuarios</text>
  <text x="40" y="125" class="muted">Productos</text>
  <text x="40" y="155" class="muted">Categorías</text>
  <text x="40" y="185" class="muted">Reportes</text>
  <text x="40" y="215" class="muted">Dashboard</text>

  <!-- Top header -->
  <rect x="260" y="20" width="920" height="70" class="panel"/>
  <text x="280" y="52" class="title">Dashboard principal</text>

  <!-- Main panels -->
  <rect x="260" y="110" width="420" height="200" class="panel"/>
  <text x="280" y="140" class="muted">Ventas del día</text>
  <text x="280" y="180" class="title">$ 1,250.00</text>

  <rect x="700" y="110" width="480" height="200" class="panel"/>
  <text x="720" y="140" class="muted">Gastos del día</text>
  <text x="720" y="180" class="title">$ 250.00</text>

  <rect x="260" y="330" width="920" height="420" class="panel"/>
  <text x="280" y="360" class="muted">Productos más vendidos</text>
  <!-- Placeholder table -->
  <rect x="280" y="380" width="860" height="320" fill="#fafafa" stroke="#eef0f6"/>

  <text x="24" y="780" class="muted">Nota: panel de administración con CRUD y reportes</text>
</svg>
